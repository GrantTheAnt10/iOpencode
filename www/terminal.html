<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  body { margin: 0; padding: 0; background: #1a1a2e; color: #e0e0e0; font-family: 'Menlo', 'Courier New', monospace; }
  #terminal { width: 100vw; height: 100vh; }
  .xterm-viewport { scrollbar-width: thin; }
</style>
<link rel="stylesheet" href="xterm.css">
</head>
<body>
<div id="terminal"></div>
<script src="xterm.js"></script>
<script src="xterm-addon-fit.js"></script>
<script>
  window.terminal = {
    term: null,
    fitAddon: null,
    inputBuffer: '',

    init() {
      this.term = new Terminal({
        cursorBlink: true,
        cursorStyle: 'block',
        fontSize: 14,
        fontFamily: 'Menlo, "Courier New", monospace',
        theme: {
          background: '#1a1a2e',
          foreground: '#e0e0e0',
          cursor: '#ffffff',
          selection: '#3a3a5e',
          black: '#1a1a2e',
          red: '#e06c75',
          green: '#98c379',
          yellow: '#d19a66',
          blue: '#61afef',
          magenta: '#c678dd',
          cyan: '#56b6c2',
          white: '#abb2bf',
        }
      });
      this.fitAddon = new FitAddon.FitAddon();
      this.term.loadAddon(this.fitAddon);
      this.term.open(document.getElementById('terminal'));
      this.fitAddon.fit();

      this.term.onData(data => {
        this.inputBuffer += data;
        if (data === '\r') {
          window.webkit.messageHandlers.terminalInput.postMessage(this.inputBuffer.trim());
          this.inputBuffer = '';
        }
      });

      window.addEventListener('resize', () => this.fitAddon.fit());
    },

    appendOutput(text) {
      this.term.write(text);
    }
  };

  document.addEventListener('DOMContentLoaded', () => window.terminal.init());
</script>
</body>
</html>
