name: Build iOpencode IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download NodeMobile.framework
        run: |
          if [ ! -d "NodeMobile.framework" ]; then
            curl -L -o /tmp/nodejs-mobile-ios.zip \
              https://github.com/JaneaSystems/nodejs-mobile/releases/download/nodejs-mobile-v0.3.3/nodejs-mobile-v0.3.3-ios.zip
            unzip /tmp/nodejs-mobile-ios.zip -d .
            mv Release-iphoneos/NodeMobile.framework .
          fi

      - name: List Xcodes
        run: ls /Applications | grep -i xcode || echo "no xcode found"

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept || true

      - name: Build archive
        run: |
          xcodebuild archive \
            -project iOpencode.xcodeproj \
            -scheme iOpencode \
            -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | xcpretty || xcodebuild archive \
            -project iOpencode.xcodeproj \
            -scheme iOpencode \
            -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p ${{ runner.temp }}/export
          /usr/libexec/PlistBuddy -c "Add method string development" ${{ runner.temp }}/export/ExportOptions.plist 2>/dev/null || true
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -exportPath ${{ runner.temp }}/export/ \
            -exportOptionsPlist ${{ runner.temp }}/export/ExportOptions.plist \
            -allowProvisioningUpdates || true

      - name: Get IPA file path
        id: get_ipa
        run: |
          cd ${{ runner.temp }}/export
          IPA_PATH=$(ls *.ipa 2>/dev/null || echo "")
          if [ -z "$IPA_PATH" ]; then
            echo "no_ipa=true" >> $GITHUB_OUTPUT
          else
            echo "ipa_path=${{ runner.temp }}/export/$IPA_PATH" >> $GITHUB_OUTPUT
            echo "ipa_name=$IPA_PATH" >> $GITHUB_OUTPUT
            echo "no_ipa=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.get_ipa.outputs.no_ipa != 'true'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: iOpencode v${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload IPA to Release
        if: steps.get_ipa.outputs.no_ipa != 'true'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.get_ipa.outputs.ipa_path }}
          asset_name: ${{ steps.get_ipa.outputs.ipa_name }}
          asset_content_type: application/octet-stream

      - name: Upload IPA as artifact
        if: steps.get_ipa.outputs.no_ipa != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: iOpencode.ipa
          path: ${{ steps.get_ipa.outputs.ipa_path }}
          if-no-files-found: warn

      - name: Show export directory
        if: always()
        run: ls -la ${{ runner.temp }}/export/ || echo "no export directory"
