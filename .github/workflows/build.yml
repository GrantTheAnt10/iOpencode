name: Build iOpencode IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Download NodeMobile.framework
        run: |
          curl -L -o /tmp/nodejs-mobile-ios.zip \
            https://github.com/JaneaSystems/nodejs-mobile/releases/download/nodejs-mobile-v0.3.3/nodejs-mobile-v0.3.3-ios.zip
          unzip -o /tmp/nodejs-mobile-ios.zip -d .
          mv Release-iphoneos/NodeMobile.framework .

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept || true

      - name: Build archive
        run: |
          xcodebuild archive -project iOpencode.xcodeproj -scheme iOpencode \
            -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild archive -project iOpencode.xcodeproj \
            -scheme iOpencode -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > /tmp/export_options.plist
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> /tmp/export_options.plist
          echo '<plist version="1.0">' >> /tmp/export_options.plist
          echo '<dict>' >> /tmp/export_options.plist
          echo '  <key>method</key>' >> /tmp/export_options.plist
          echo '  <string>none</string>' >> /tmp/export_options.plist
          echo '  <key>signingStyle</key>' >> /tmp/export_options.plist
          echo '  <string>automatic</string>' >> /tmp/export_options.plist
          echo '</dict>' >> /tmp/export_options.plist
          echo '</plist>' >> /tmp/export_options.plist

          mkdir -p ${{ runner.temp }}/ipa
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -exportPath ${{ runner.temp }}/ipa \
            -exportOptionsPlist /tmp/export_options.plist || {
            echo "xcodebuild export failed, trying manual IPA creation"
            mkdir -p ${{ runner.temp }}/ipa/Payload
            find ${{ runner.temp }}/iOpencode.xcarchive -name "*.app" -type d -exec cp -R {} ${{ runner.temp }}/ipa/Payload/ \; 2>/dev/null
            cd ${{ runner.temp }}/ipa && zip -r ${{ runner.temp }}/iOpencode.ipa Payload/
          }
          if [ -f "${{ runner.temp }}/ipa/iOpencode.ipa" ]; then
            cp ${{ runner.temp }}/ipa/iOpencode.ipa ${{ runner.temp }}/iOpencode.ipa
            echo "IPA created:"
            ls -lh ${{ runner.temp }}/iOpencode.ipa
          elif [ -f "${{ runner.temp }}/ipa/Payload/iOpencode.app" ]; then
            cd ${{ runner.temp }}/ipa && zip -r ${{ runner.temp }}/iOpencode.ipa Payload/
            echo "IPA created manually:"
            ls -lh ${{ runner.temp }}/iOpencode.ipa
          else
            echo "ERROR: IPA creation failed"
            ls -la ${{ runner.temp }}/ipa/ 2>/dev/null || true
            find ${{ runner.temp }}/iOpencode.xcarchive -type d 2>/dev/null | head -20
            exit 1
          fi

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOpencode-v1
          path: ${{ runner.temp }}/iOpencode.ipa
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: "iOpencode v1 - AI Coding Assistant for iOS"
          files: ${{ runner.temp }}/iOpencode.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}