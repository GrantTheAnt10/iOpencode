name: Build iOpencode IPA
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Download NodeMobile.framework
        run: |
          if [ ! -d "NodeMobile.framework" ]; then
            curl -L -o /tmp/nodejs-mobile-ios.zip \
              https://github.com/JaneaSystems/nodejs-mobile/releases/download/nodejs-mobile-v0.3.3/nodejs-mobile-v0.3.3-ios.zip
            unzip /tmp/nodejs-mobile-ios.zip -d .
            mv Release-iphoneos/NodeMobile.framework .
          fi

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept || true

      - name: Build archive
        run: |
          xcodebuild archive -project iOpencode.xcodeproj -scheme iOpencode \
            -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild archive -project iOpencode.xcodeproj \
            -scheme iOpencode -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA
        run: |
          mkdir -p ${{ runner.temp }}/ipa/Payload
          APP="${{ runner.temp }}/iOpencode.xcarchive/Products/Applications/iOpencode.app"
          if [ -d "$APP" ]; then
            cp -R "$APP" ${{ runner.temp }}/ipa/Payload/
            cd ${{ runner.temp }}/ipa && zip -r ${{ runner.temp }}/iOpencode.ipa Payload/
            echo "IPA created:"
            ls -lh ${{ runner.temp }}/iOpencode.ipa
          else
            echo "No app found - trying xcodebuild export"
            mkdir -p ${{ runner.temp }}/export
            /usr/libexec/PlistBuddy -c "Add method string development" \
              ${{ runner.temp }}/export/ExportOptions.plist 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add signingStyle string manual" \
              ${{ runner.temp }}/export/ExportOptions.plist 2>/dev/null || true
            xcodebuild -exportArchive \
              -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
              -exportPath ${{ runner.temp }}/export/ \
              -exportOptionsPlist ${{ runner.temp }}/export/ExportOptions.plist \
              -allowProvisioningUpdates || true
            cp ${{ runner.temp }}/export/*.ipa ${{ runner.temp }}/iOpencode.ipa 2>/dev/null || true
          fi

      - name: Verify IPA
        run: |
          if [ -f "${{ runner.temp }}/iOpencode.ipa" ]; then
            echo "ipa_exists=true" >> $GITHUB_OUTPUT
          else
            echo "ipa_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.Verify.outputs.ipa_exists == 'true'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: iOpencode v${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload IPA to Release
        if: steps.Verify.outputs.ipa_exists == 'true'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ runner.temp }}/iOpencode.ipa
          asset_name: iOpencode.ipa
          asset_content_type: application/octet-stream

      - name: Upload IPA as artifact
        if: steps.Verify.outputs.ipa_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: iOpencode.ipa
          path: ${{ runner.temp }}/iOpencode.ipa
          if-no-files-found: warn
