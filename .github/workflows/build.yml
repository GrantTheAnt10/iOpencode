name: Build IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Download frameworks
        run: bash downloadFrameworks.sh

      - name: Build archive
        run: |
          xcodebuild archive \
            -scheme "a-Shell-mini" \
            -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/a-shell.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p ${{ runner.temp }}/export
          /usr/libexec/PlistBuddy -c "Add method string development" ${{ runner.temp }}/export/ExportOptions.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add signingStyle string manual" ${{ runner.temp }}/export/ExportOptions.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add stripSwiftSymbols bool false" ${{ runner.temp }}/export/ExportOptions.plist 2>/dev/null || true
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/a-shell.xcarchive \
            -exportPath ${{ runner.temp }}/export/ \
            -exportOptionsPlist ${{ runner.temp }}/export/ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: a-shell-mini.ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
