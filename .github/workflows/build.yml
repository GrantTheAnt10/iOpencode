name: Build iOpencode IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Download NodeMobile.framework
        run: |
          curl -L -o /tmp/nodejs-mobile-ios.zip \
            https://github.com/JaneaSystems/nodejs-mobile/releases/download/nodejs-mobile-v0.3.3/nodejs-mobile-v0.3.3-ios.zip
          unzip -o /tmp/nodejs-mobile-ios.zip -d .
          mv Release-iphoneos/NodeMobile.framework .

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept || true

      - name: Build app
        run: |
          mkdir -p ${{ runner.temp }}/build
          xcodebuild -project iOpencode.xcodeproj -scheme iOpencode \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ${{ runner.temp }}/build

      - name: Create app package
        run: |
          APP=$(find ${{ runner.temp }}/build -name "*.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ] && [ -d "$APP" ]; then
            echo "App bundle found at: $APP"
            ls -la "$APP"
          else
            echo "ERROR: App not found"
            find ${{ runner.temp }}/build -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi

      - name: Upload app as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOpencode-v1
          path: ${{ runner.temp }}/build/Products/Release-iphonesimulator/*.app
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: "iOpencode v1 - AI Coding Assistant for iOS (Simulator Build)"
          files: ${{ runner.temp }}/build/Products/Release-iphonesimulator/*.app
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}