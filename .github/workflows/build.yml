name: Build iOpencode IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Download NodeMobile.framework
        run: |
          curl -L -o /tmp/nodejs-mobile-ios.zip \
            https://github.com/JaneaSystems/nodejs-mobile/releases/download/nodejs-mobile-v0.3.3/nodejs-mobile-v0.3.3-ios.zip
          unzip -o /tmp/nodejs-mobile-ios.zip -d .
          mv Release-iphoneos/NodeMobile.framework .

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept || true

      - name: Build archive
        run: |
          xcodebuild archive -project iOpencode.xcodeproj -scheme iOpencode \
            -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="-"

      - name: Create unsigned IPA
        run: |
          APP="${{ runner.temp }}/iOpencode.xcarchive/Products/Applications/iOpencode.app"
          if [ -d "$APP" ]; then
            mkdir -p ${{ runner.temp }}/ipa/Payload
            cp -R "$APP" ${{ runner.temp }}/ipa/Payload/
            cd ${{ runner.temp }}/ipa && zip -r ${{ runner.temp }}/iOpencode.ipa Payload/
            echo "IPA created:"
            ls -lh ${{ runner.temp }}/iOpencode.ipa
          else
            echo "ERROR: App not found at $APP"
            ls -la "${{ runner.temp }}/iOpencode.xcarchive/Products/" 2>/dev/null || true
            ls -la "${{ runner.temp }}/iOpencode.xcarchive/Products/Applications/" 2>/dev/null || true
            exit 1
          fi

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOpencode-v1
          path: ${{ runner.temp }}/iOpencode.ipa
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: "iOpencode v1 - AI Coding Assistant for iOS"
          files: ${{ runner.temp }}/iOpencode.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}