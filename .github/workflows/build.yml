name: Build iOpencode IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download NodeMobile.framework
        run: |
          if [ ! -d "NodeMobile.framework" ]; then
            curl -L -o /tmp/NodeMobile.framework.zip \
              https://github.com/cjntjy/nodejs-mobile-ios/releases/download/v0.3.3/NodeMobile.framework.zip
            unzip /tmp/NodeMobile.framework.zip -d .
          fi

      - name: List Xcodes
        run: ls /Applications | grep -i xcode || echo "no xcode found"

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept || true

      - name: Build archive
        run: |
          xcodebuild archive \
            -project iOpencode.xcodeproj \
            -scheme iOpencode \
            -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | xcpretty || xcodebuild archive \
            -project iOpencode.xcodeproj \
            -scheme iOpencode \
            -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p ${{ runner.temp }}/export
          /usr/libexec/PlistBuddy -c "Add method string development" ${{ runner.temp }}/export/ExportOptions.plist 2>/dev/null || true
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -exportPath ${{ runner.temp }}/export/ \
            -exportOptionsPlist ${{ runner.temp }}/export/ExportOptions.plist \
            -allowProvisioningUpdates || true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOpencode.ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: warn
