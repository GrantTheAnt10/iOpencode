name: Build iOpencode IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Download NodeMobile.framework
        run: |
          curl -L -o /tmp/nodejs-mobile-ios.zip \
            https://github.com/JaneaSystems/nodejs-mobile/releases/download/nodejs-mobile-v0.3.3/nodejs-mobile-v0.3.3-ios.zip
          unzip -o /tmp/nodejs-mobile-ios.zip -d .
          mv Release-iphoneos/NodeMobile.framework .

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept || true

      - name: Build archive
        run: |
          xcodebuild archive -project iOpencode.xcodeproj -scheme iOpencode \
            -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild archive -project iOpencode.xcodeproj \
            -scheme iOpencode -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA
        run: |
          EXPORT_PATH=${{ runner.temp }}/export
          mkdir -p "$EXPORT_PATH"
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/iOpencode.xcarchive \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist - << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>none</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          if [ -f "$EXPORT_PATH/iOpencode.ipa" ]; then
            cp "$EXPORT_PATH/iOpencode.ipa" ${{ runner.temp }}/iOpencode.ipa
            echo "IPA created:"
            ls -lh ${{ runner.temp }}/iOpencode.ipa
          else
            echo "ERROR: IPA not created"
            ls -la "$EXPORT_PATH" 2>/dev/null || true
            exit 1
          fi

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOpencode-v1
          path: ${{ runner.temp }}/iOpencode.ipa
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: "iOpencode v1 - AI Coding Assistant for iOS"
          files: ${{ runner.temp }}/iOpencode.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}